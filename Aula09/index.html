<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros passos com DOM</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(82, 82, 206);
            color: #ebebeb;
        }
        h1{
            text-align: center;
            margin: 10px;
        }
        p{
            padding: 5px;
        }
        div{
            padding: 5px;
            border: 1px solid #ebebeb;
            border-radius: 5px;
            width: 150px;
            text-align: center;
            margin-left: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Iniciando estudos com DOM</h1>
    <p>Aprendendo a usar <strong>DOM</strong> (Document Object Model) em JavaScript</p>
    <p>Aqui vai o resultado:</p>

    <div id="botao">Clique em mim!</div>
    
    <script>
        var p1 = window.document.getElementsByTagName('p')[0] // Selecionando documento por tag, 0 indica escolher o primeiro
        //document.write(p1.innerHTML)

        //var botao = window.document.getElementById('botao')
        //botao.style.background = 'green'
        var d = window.document.querySelector('div#botao')
        d.style.background = 'red'
    </script>
</body>
</html>
