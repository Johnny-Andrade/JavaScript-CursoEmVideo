<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        div#area{
            font: normal 20pt Arial;
            background-color: #468146;
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja...
    </div>

    <script>
        var area = window.document.querySelector("div#area")
        area.addEventListener('click', clicou)
        area.addEventListener('mouseenter', entrou)
        area.addEventListener('mouseout', saiu)

        function clicou(){
            area.innerText = 'Clicou!'
            area.style.background = 'red'
            area.style.color = 'white'
        }
        function entrou(){
            area.innerText = 'Entrou!'
            area.style.color = 'black'
            area.style.background = 'yellow'
        }
        function saiu(){
            area.innerText = 'Tchauzinho!'
            area.style.background = '#468146'
            area.style.color = 'white'
        }
    </script>
</body>
</html>
