<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tratamento de Dados</title>
    <style>
        body{
            background-color: #40628d;
        }
        h1{
            text-align: center;
            color: #ebebeb;
        }
        p{
            text-align: justify;
            color: #ebebeb;
        }/*Comentário em CSS é assim*/
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Parágrafos são colocados entre a tag p, é bem intuitivo!</p> 
    <!--Assim se comenta em HTML-->

    <script>
        var nome = window.prompt('Escreva seu nome:')
        window.alert('É um grande prazer te conhecer, '+nome+'!') //Nesse caso, + é concatenação (junção)
    </script>
</body>
</html>
