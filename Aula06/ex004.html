<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tratamento de Dados</title>
    <style>
        body{
            background-color: #40628d;
            color: #ebebeb;
        }
        h1{
            text-align: center;
            color: #dfcb5f;
        }
        p{
            text-align: justify;
            color: #ebebeb;
        }
    </style>
</head>
<body>
    <h1>Nomes</h1>

    <script>
        var nome = window.prompt('Qual é o seu nome?')
        document.write(`Olá, ${nome}!Seu nome tem ${nome.length} letras! <br>`)
        document.writeln(`Seu nome tudo maiúsculo é ${nome.toUpperCase()} <br>`)

        sal = 4450.60
        document.writeln(`Você deveria ganhar ${sal.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}`)
    </script>
</body>
</html>
